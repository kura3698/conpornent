  <body>
    <h1>カード</h1>
    <div class="l-inner">
      <!-------------------------------
      //    カード
      //------------------------------->

      <div class="a-card">
        <div class="a-card__head">
          <div class="a-card__bg"></div>
          <span class="a-card__number">01</span>
          <h2 class="a-card__text">もう"文章に1時間"<br />悩まなくていい</h2>
        </div>
        <div class="a-card__body">
          <div class="a-card__description-wrap">
            <p class="a-card__description">
              今までは、投稿1つ考えるだけで1時間。<br />「この表現でいいのかな？」「もっといい言い方があるのでは？」と手が止まっていたかもしれません。でもサロンチャームなら、型に沿ってスマホでポチポチするだけ。10分
              ※ほどで"予約につながる文章"が完成します。余った時間は施術に集中することも、ゆっくりお茶を飲むことだってできます。
            </p>
            <span class="a-card__attention">
              ※文章作成時間には個人差があります。<br />慣れによって所要時間が短縮されるケースもあります。
            </span>
          </div>
          <figure class="a-card__image">
            <img
              src="./img/img_benefit-1.webp"
              loading="lazy"
              alt="12時を指し示そうな時計の画像"
              width="361"
              height="180"
            />
          </figure>
        </div>
      </div>
    </div>
